<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap header-inner">
        <div>
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <p class="site-tagline">{{ site.description }}</p>
        </div>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/archive/' | relative_url }}">Archive</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
        </nav>
      </div>
    </header>

    <main class="wrap main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="wrap footer-inner">
        <p>© {{ 'now' | date: '%Y' }} {{ site.author.name | default: site.title }}</p>
        <p><a href="{{ '/' | relative_url }}">Back to top</a></p>
      </div>
    </footer>
  </body>
</html>
