---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.categories and page.categories.size > 0 %} · {{ page.categories | join: ', ' }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <hr>

  <p><a href="{{ '/archive/' | relative_url }}">← Back to archive</a></p>
</article>
